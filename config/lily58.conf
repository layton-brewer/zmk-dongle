# Shared config for both Lily58 halves (now peripherals to the dongle).
# A file without _left/_right suffix applies to both halves automatically.
#
# Key bindings are no longer set here — they live in
# config/lily58_dongle.keymap, since the dongle is the central that
# processes the keymap. This file is just for hardware/feature toggles.

# Uncomment to improve BLE connection strength between each half and the
# dongle, at a negligible power cost. Worth enabling if you have
# pairing/range issues.
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Uncomment to enable the on-board OLED display on each half (if your
# Lily58 PCBs have one wired up).
# CONFIG_ZMK_DISPLAY=y

# Deep sleep: puts each half into a low-power "off" state after a period
# of inactivity. Each half's timer is independent and based on its own
# keypresses, so both will sleep ~10 minutes after the last key press on
# that half. Waking up happens automatically on the next keypress (may
# take a couple seconds to reconnect). This does NOT affect the dongle.
CONFIG_ZMK_SLEEP=y
# 10 minutes, in milliseconds (10 * 60 * 1000)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000
