# Config for the Lily58 dongle (the BLE central / USB host connection point).
#
# Uncomment lines below to enable optional features.

# Uncomment to make the dongle always prefer USB output over BLE when both
# are available (useful since the dongle is almost always plugged in via USB).
# CONFIG_ZMK_USB=y

# Uncomment if you want to use ZMK Studio with this dongle.
# CONFIG_ZMK_STUDIO=y

# Improves BLE connection strength between the dongle and the two halves,
# at a negligible power cost. Worth enabling if you have pairing/range issues.
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
